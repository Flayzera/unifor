name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studyroom-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build and test backend
        run: ./mvnw verify

      - name: Build backend Docker image
        run: docker build -t studyroom-backend:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studyroom-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: studyroom-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy hook
        if: ${{ secrets.BACKEND_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.BACKEND_DEPLOY_HOOK_URL }}"

      - name: Trigger frontend deploy hook
        if: ${{ secrets.FRONTEND_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "${{ secrets.FRONTEND_DEPLOY_HOOK_URL }}"
